<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>现代 Todo List - 任务管理应用</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- 自定义动画和主题样式 -->
    <link rel="stylesheet" href="styles/animations.css">

    <style>
        :root {
            --primary-color: #3b82f6;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
        }

        body {
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        body.light-theme {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #1f2937;
        }

        body.dark-theme {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: #f3f4f6;
        }

        .glass-effect {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .dark-theme .glass-effect {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .priority-high {
            border-left: 4px solid #ef4444;
        }

        .priority-medium {
            border-left: 4px solid #f59e0b;
        }

        .priority-low {
            border-left: 4px solid #10b981;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .dark-theme .stat-card {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="light-theme min-h-screen py-8 px-4">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-4xl font-bold gl mb-2">✨ 我的任务</h1>
                <p class="text-opacity-80">organized and productive</p>
            </div>
            <button id="themeToggle" class="glass-effect p-3 rounded-lg hover:scale-110 transition-transform duration-200">
                <span class="text-2xl">🌙</span>
            </button>
        </div>

        <!-- Statistics -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="stat-card p-4 rounded-lg text-center transform hover:scale-105 transition-transform">
                <div class="text-2xl font-bold text-blue-500" id="totalCount">0</div>
                <div class="text-sm opacity-70">总任务</div>
            </div>
            <div class="stat-card p-4 rounded-lg text-center transform hover:scale-105 transition-transform">
                <div class="text-2xl font-bold text-yellow-500" id="pendingCount">0</div>
                <div class="text-sm opacity-70">待完成</div>
            </div>
            <div class="stat-card p-4 rounded-lg text-center transform hover:scale-105 transition-transform">
                <div class="text-2xl font-bold text-green-500" id="completedCount">0</div>
                <div class="text-sm opacity-70">已完成</div>
            </div>
            <div class="stat-card p-4 rounded-lg text-center transform hover:scale-105 transition-transform">
                <div class="text-2xl font-bold text-purple-500" id="completionRate">0%</div>
                <div class="text-sm opacity-70">完成率</div>
            </div>
        </div>

        <!-- Input Section -->
        <div class="glass-effect rounded-lg p-6 mb-8 task-input-section">
            <h2 class="text-lg font-semibold mb-4">添加新任务</h2>
            <div class="space-y-4">
                <!-- Task Input -->
                <input
                    type="text"
                    id="taskInput"
                    placeholder="输入任务内容..."
                    class="w-full px-4 py-3 rounded-lg bg-white bg-opacity-20 border border-white border-opacity-30 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:ring-opacity-80 transition-all"
                />

                <!-- Task Details Row -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <!-- Category -->
                    <div>
                        <label class="block text-sm mb-2 opacity-80">分类</label>
                        <select id="categorySelect" class="w-full px-4 py-2 rounded-lg bg-white bg-opacity-20 border border-white border-opacity-30 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:ring-opacity-80">
                            <option>工作</option>
                            <option>生活</option>
                            <option>学习</option>
                            <option>其他</option>
                        </select>
                    </div>

                    <!-- Priority -->
                    <div>
                        <label class="block text-sm mb-2 opacity-80">优先级</label>
                        <select id="prioritySelect" class="w-full px-4 py-2 rounded-lg bg-white bg-opacity-20 border border-white border-opacity-30 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:ring-opacity-80">
                            <option value="low">低 🟢</option>
                            <option value="medium" selected>中 🟡</option>
                            <option value="high">高 🔴</option>
                        </select>
                    </div>

                    <!-- Tags Input -->
                    <div>
                        <label class="block text-sm mb-2 opacity-80">标签</label>
                        <input
                            type="text"
                            id="tagsInput"
                            placeholder="用逗号分隔, 例: 紧急,重要"
                            class="w-full px-4 py-2 rounded-lg bg-white bg-opacity-20 border border-white border-opacity-30 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:ring-opacity-80"
                        />
                    </div>
                </div>

                <!-- Add Button -->
                <button
                    id="addBtn"
                    class="w-full bg-blue-500 hover:bg-blue-600 active:scale-95 text-white font-bold py-3 px-4 rounded-lg transition-all duration-200 transform hover:shadow-lg"
                >
                    ➕ 添加任务
                </button>
            </div>
        </div>

        <!-- Filter Section -->
        <div class="glass-effect rounded-lg p-4 mb-8">
            <h2 class="text-lg font-semibold mb-4">筛选任务</h2>
            <div class="flex flex-wrap gap-2">
                <button class="filter-btn px-4 py-2 rounded-full bg-blue-500 text-white" data-filter="all">全部</button>
                <button class="filter-btn px-4 py-2 rounded-full bg-opacity-50" data-filter="pending">待完成</button>
                <button class="filter-btn px-4 py-2 rounded-full bg-opacity-50" data-filter="completed">已完成</button>
                <select id="categoryFilter" class="px-4 py-2 rounded-full bg-white bg-opacity-20 border border-white border-opacity-30 focus:outline-none cursor-pointer">
                    <option value="">所有分类</option>
                    <option>工作</option>
                    <option>生活</option>
                    <option>学习</option>
                    <option>其他</option>
                </select>
                <select id="priorityFilter" class="px-4 py-2 rounded-full bg-white bg-opacity-20 border border-white border-opacity-30 focus:outline-none cursor-pointer">
                    <option value="">所有优先级</option>
                    <option value="high">高</option>
                    <option value="medium">中</option>
                    <option value="low">低</option>
                </select>
                <button id="clearFilters" class="px-4 py-2 rounded-full bg-red-500 bg-opacity-70 hover:bg-opacity-100 text-white transition-all">清除筛选</button>
            </div>
        </div>

        <!-- Task List -->
        <div id="taskList" class="space-y-3">
            <!-- Tasks will be generated here -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="glass-effect rounded-lg p-12 text-center">
            <div class="text-6xl mb-4">📭</div>
            <p class="text-lg opacity-70">暂无任务，开始添加一个新任务吧！</p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/app.js"></script>
</body>
</html>
